<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AM Tabs | Benimle Ucmak Ister Misin?</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2318201c'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%237ecb87' stroke-width='5'/%3E%3Cpath d='M21 38c6 5 16 5 22 0M24 27h17M28 18h11' fill='none' stroke='%23f4fbf4' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="root" data-playing="off">
    <div id="app">
      <header id="song-header" class="hero-card">
        <div class="hero-main">
          <div class="hero-copy">
            <div class="hero-kicker">Track: Yavuz Cetin Solo - Overdriven Guitar</div>
            <h1>Benimle Ucmak Ister Misin? <span>Tab</span></h1>
            <p class="hero-meta">
              <a href="#">Yavuz Cetin</a>
              <span>Revision from: 10/17/2024</span>
              <span>Free tab view</span>
            </p>
          </div>
          <div class="hero-actions">
            <button id="favorite-toggle" class="circle-action" type="button" aria-label="Favorite">
              <svg viewBox="0 0 32 32" width="26" height="26">
                <circle cx="16" cy="16" r="14"></circle>
                <path d="M16 8l2.4 5 5.6.6-4.2 3.7 1.2 5.6-5-2.8-5 2.8 1.2-5.6-4.2-3.7 5.6-.6z"></path>
              </svg>
            </button>
            <div class="revision-card">
              <span>Last edit</span>
              <strong>10/17/2024</strong>
            </div>
          </div>
        </div>

        <div class="hero-rail">
          <div class="hero-search-card">
            <div class="hero-search-bar">
              <svg class="hero-search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <input type="text" id="hero-search-input" placeholder="Şarkı veya sanatçı ara..." autocomplete="off">
              <button id="hero-search-btn" class="hero-search-submit">Ara</button>
            </div>
            <div id="hero-search-results" class="hero-search-results hidden"></div>
          </div>
          <div class="hero-actions-card">
            <button id="hero-library-btn" class="hero-action-btn" type="button">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 19.5A2.5 2.5 0 016.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"></path>
              </svg>
              <span>Kütüphane</span>
            </button>
            <button id="hero-import-btn" class="hero-action-btn" type="button">
              <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
              </svg>
              <span>Dosya Yükle</span>
            </button>
            <input type="file" id="hero-file-input" accept=".gp,.gp3,.gp4,.gp5,.gpx,.gp8" style="display:none">
          </div>
        </div>
      </header>

      <aside id="controls" class="control-bar">
        <div class="track-switcher">
          <div class="track-icon" aria-hidden="true" id="open-mixer-btn" style="cursor: pointer;">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 17V7M8 21v-8M12 13V3M16 19v-6M20 15V9"></path>
            </svg>
          </div>
          <div class="track-copy">
            <strong>Mixer</strong>
            <span id="current-track-name">Loading...</span>
          </div>
        </div>

        <div class="transport-cluster">
          <button id="control-play" class="play-toggle" type="button" aria-pressed="false" title="Play">
            <svg class="play-svg" viewBox="0 0 36 36" width="36" height="36" aria-hidden="true">
              <circle cx="18" cy="18" r="17"></circle>
              <polygon class="play-shape" points="14,10 27,18 14,26"></polygon>
              <g class="pause-shape" aria-hidden="true">
                <rect x="12.5" y="10" width="4.5" height="16" rx="1"></rect>
                <rect x="20" y="10" width="4.5" height="16" rx="1"></rect>
              </g>
            </svg>
          </button>

          <div id="control-source" class="source-toggle" role="radiogroup" aria-label="Audio source">
            <button class="source-option is-active" type="button" data-source="original" aria-pressed="true">Original</button>
            <button class="source-option" type="button" data-source="synth" aria-pressed="false">Synth</button>
          </div>

          <button id="control-speed" class="tool-button" type="button">
            <span class="tool-icon">S</span>
            <span class="tool-copy">
              <strong id="speed-readout">100%</strong>
              <small>Speed</small>
            </span>
          </button>

          <button id="control-loop" class="tool-button" type="button" aria-pressed="true">
            <span class="tool-icon">L</span>
            <span class="tool-copy">
              <strong id="loop-readout">On</strong>
              <small>Loop</small>
            </span>
          </button>

          <button class="tool-button" id="control-metronome" type="button" aria-pressed="true">
            <span class="tool-icon">M</span>
            <span class="tool-copy">
              <strong>On</strong>
              <small>Metronome</small>
            </span>
          </button>

          <button class="tool-button" id="control-autoscroll" type="button" aria-pressed="true">
            <span class="tool-icon">A</span>
            <span class="tool-copy">
              <strong id="autoscroll-readout">On</strong>
              <small>Auto-Scroll</small>
            </span>
          </button>
        </div>

        <div class="timeline-cluster">
          <div class="timeline-copy">
            <strong id="measure-readout">Olcu 1 / 228</strong>
            <span id="section-readout">Intro</span>
          </div>
          <input id="measure-slider" type="range" min="1" max="228" value="1" step="0.01" aria-label="Measure position">
          <div class="time-copy" id="time-readout">00:00 / 06:00</div>
        </div>
      </aside>

      <main id="apptab" class="tab-page">
        <section id="tablature" role="application" data-id="Print--free" data-print="off" data-editor="off"></section>
      </main>
    </div>
  </div>

  <div id="mixer-overlay" class="mixer-overlay hidden">
    <div class="mixer-modal">
      <div class="mixer-header">
        <h2>Tracks Mixer</h2>
        <button id="close-mixer-btn" class="circle-action" style="width: 36px; height: 36px;">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"></path></svg>
        </button>
      </div>
      <div id="mixer-track-list" class="mixer-tracks">
        <!-- Tracks injected here -->
      </div>
    </div>
  </div>

  <!-- Library Overlay -->
  <div id="library-overlay" class="mixer-overlay hidden">
    <div class="mixer-modal lib-modal">
      <div class="mixer-header">
        <h2>Kütüphane</h2>
        <div class="lib-header-actions">
          <button id="lib-import-btn" class="lib-import-btn" title="Dosya Yükle">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span>Dosya Yükle</span>
          </button>
          <input type="file" id="lib-file-input" accept=".gp,.gp3,.gp4,.gp5,.gpx,.gp8" style="display:none">
          <button id="close-library-btn" class="circle-action" style="width: 36px; height: 36px;">
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"></path></svg>
          </button>
        </div>
      </div>
      <div id="library-list" class="lib-list">
        <!-- Songs injected here -->
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@coderline/alphatab@latest/dist/alphaTab.js"></script>
  <script src="db.js"></script>
  <script src="effects.js"></script>
  <script src="songsterr.js"></script>
  <script src="library.js"></script>
  <script src="app.js"></script>
</body>
</html>
